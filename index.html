```html
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roblox ID Finder</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#050816,#0b1026);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    width:500px;
    max-width:95%;
    background:rgba(20,20,40,0.95);
    border:1px solid #7c3aed;
    border-radius:20px;
    padding:30px;
    box-shadow:0 0 40px rgba(124,58,237,.35);
}

h1{
    text-align:center;
    margin-bottom:25px;
}

.purple{
    color:#a855f7;
}

.input-box{
    display:flex;
    gap:10px;
}

input{
    flex:1;
    padding:15px;
    border:none;
    outline:none;
    border-radius:12px;
    background:#111827;
    color:white;
    font-size:16px;
}

button{
    padding:15px 25px;
    border:none;
    border-radius:12px;
    background:linear-gradient(90deg,#9333ea,#6366f1);
    color:white;
    cursor:pointer;
    font-weight:600;
}

button:hover{
    opacity:0.9;
}

.profile{
    margin-top:25px;
    display:none;
    text-align:center;
}

.avatar{
    width:150px;
    height:150px;
    border-radius:50%;
    border:4px solid #a855f7;
    object-fit:cover;
}

.username{
    font-size:28px;
    font-weight:700;
    margin-top:15px;
}

.userid{
    color:#a855f7;
    margin-top:10px;
    font-weight:600;
}

.error{
    color:#ff4d4d;
    margin-top:20px;
    text-align:center;
}

#copyBtn{
    display:none;
    margin-top:15px;
}
</style>
</head>
<body>

<div class="card">

    <h1>Roblox <span class="purple">ID Finder</span></h1>

    <div class="input-box">
        <input type="text" id="username" placeholder="Pseudo Roblox">
        <button onclick="searchUser()">Chercher</button>
    </div>

    <div id="error" class="error"></div>

    <div class="profile" id="profile">
        <img id="avatar" class="avatar">
        <div class="username" id="displayName"></div>
        <div id="userTag"></div>
        <div class="userid" id="userId"></div>

        <button id="copyBtn">
            📋 Copier l'ID
        </button>
    </div>

</div>

<script>
async function searchUser() {

    const username = document.getElementById("username").value;
    const error = document.getElementById("error");
    const profile = document.getElementById("profile");

    error.textContent = "";
    profile.style.display = "none";

    try {

        const res = await fetch(
            `https://roblox-id-finder-oou5.vercel.app/user/${username}`
        );

        const user = await res.json();

        if(user.error){
            error.textContent = user.error;
            return;
        }

        document.getElementById("displayName").textContent = user.name;
        document.getElementById("userTag").textContent = "@" + user.name;
        document.getElementById("userId").textContent = "ID : " + user.id;

        document.getElementById("avatar").src =
        `https://www.roblox.com/headshot-thumbnail/image?userId=${user.id}&width=420&height=420&format=png`;

        document.getElementById("copyBtn").style.display = "inline-block";

        profile.style.display = "block";

    } catch(err){
        error.textContent = "Erreur lors de la recherche.";
        console.error(err);
    }
}

document.getElementById("copyBtn").addEventListener("click", () => {

    const idText = document.getElementById("userId").textContent;
    const id = idText.replace("ID : ", "");

    navigator.clipboard.writeText(id);

    const btn = document.getElementById("copyBtn");

    btn.textContent = "✅ ID copié !";

    setTimeout(() => {
        btn.textContent = "📋 Copier l'ID";
    }, 2000);
});
</script>

</body>
</html>
